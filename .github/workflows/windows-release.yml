name: Windows Build

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag to attach installers to, for example v0.1.1"
        required: false
        type: string
  release:
    types: [published]
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - ".github/workflows/windows-release.yml"
      - "apps/desktop/**"
      - "apps/browser-extension/**"
      - "apps/vscode-extension/**"
      - "crates/**"
      - "scripts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "package.json"
      - "apps/desktop/package.json"
      - "apps/desktop/package-lock.json"
      - "!**/node_modules/**"
      - "!**/*.md"
      - "!docs/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/windows-release.yml"
      - "apps/desktop/**"
      - "apps/browser-extension/**"
      - "apps/vscode-extension/**"
      - "crates/**"
      - "scripts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "package.json"
      - "apps/desktop/package.json"
      - "apps/desktop/package-lock.json"
      - "!**/node_modules/**"
      - "!**/*.md"
      - "!docs/**"

concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    name: Windows quality gate
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            apps/desktop/src-tauri -> apps/desktop/src-tauri/target

      - name: Install desktop dependencies
        run: npm --prefix apps/desktop ci

      - name: Typecheck desktop
        run: npm --prefix apps/desktop run check

      - name: Test desktop UI
        run: npm --prefix apps/desktop run test

      - name: Build desktop frontend
        run: npm --prefix apps/desktop run build

      - name: Check browser bridge extension
        run: npm run browser-extension:check

      - name: Check editor bridge extension
        run: npm run vscode-extension:check

      - name: Test packaging and bridge scripts
        run: npm run test:scripts

      - name: Test Rust workspace
        run: cargo test --workspace --all-targets

      - name: Test desktop Rust backend
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --all-targets

  installer:
    name: Windows installer
    runs-on: windows-latest
    needs: quality
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            apps/desktop/src-tauri -> apps/desktop/src-tauri/target

      - name: Install desktop dependencies
        run: npm --prefix apps/desktop ci

      - name: Build desktop frontend
        run: npm --prefix apps/desktop run build

      - name: Build NSIS and MSI installers with updater bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: npm --prefix apps/desktop run tauri -- build --bundles nsis,msi

      - name: Upload Windows installers and updater bundle
        uses: actions/upload-artifact@v4
        with:
          name: daytrail-windows-installers
          if-no-files-found: error
          path: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/nsis/*.nsis.zip
            apps/desktop/src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi

      - name: Resolve release upload target
        id: release_target
        if: |
          startsWith(github.ref, 'refs/tags/v') ||
          github.event_name == 'release' ||
          (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        shell: pwsh
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag || '' }}
          EVENT_RELEASE_TAG: ${{ github.event.release.tag_name || '' }}
        run: |
          $tag = ""
          if ($env:INPUT_RELEASE_TAG) {
            $tag = $env:INPUT_RELEASE_TAG
          } elseif ($env:EVENT_RELEASE_TAG) {
            $tag = $env:EVENT_RELEASE_TAG
          } elseif ($env:GITHUB_REF -like "refs/tags/v*") {
            $tag = $env:GITHUB_REF_NAME
          }
          Write-Host "Release upload target: $tag"
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Attach Windows installers and updater bundle to GitHub Release
        if: steps.release_target.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          overwrite_files: true
          tag_name: ${{ steps.release_target.outputs.tag }}
          files: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/nsis/*.nsis.zip
            apps/desktop/src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi

      - name: Merge Windows entry into latest.json
        if: steps.release_target.outputs.tag != ''
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release_target.outputs.tag }}
        run: |
          $ErrorActionPreference = "Stop"
          $version = $env:TAG -replace '^v', ''
          $baseUrl = "https://github.com/varaprasadreddy9676/DayTrail/releases/download/$($env:TAG)"

          $sigFile = Get-ChildItem "apps/desktop/src-tauri/target/release/bundle/nsis/*.nsis.zip.sig" |
            Select-Object -First 1
          if (-not $sigFile) { throw "nsis.zip.sig not found — updater bundle was not built" }
          $signature = (Get-Content $sigFile.FullName -Raw).Trim()

          $pubDate = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")

          # Download existing latest.json (written by the macOS job) and merge.
          # If it does not exist yet, start with an empty platforms object.
          $latestPath = "$env:TEMP\latest.json"
          $existing = $null
          try {
            gh release download $env:TAG --pattern "latest.json" --output $latestPath --clobber 2>$null
            $existing = Get-Content $latestPath -Raw | ConvertFrom-Json
          } catch {}

          if ($null -eq $existing) {
            $existing = [PSCustomObject]@{
              version  = $version
              pub_date = $pubDate
              platforms = [PSCustomObject]@{}
            }
          }

          # Add / overwrite the Windows x86_64 entry.
          $existing.platforms | Add-Member -Force -NotePropertyName "windows-x86_64" -NotePropertyValue ([PSCustomObject]@{
            signature = $signature
            url       = "$baseUrl/DayTrail_${version}_x64-setup.nsis.zip"
          })

          $existing | ConvertTo-Json -Depth 10 | Set-Content $latestPath -Encoding UTF8
          gh release upload $env:TAG $latestPath --clobber
          Write-Host "latest.json updated with windows-x86_64 entry for $($env:TAG)"
