name: Windows Build

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag to attach installers to, for example v0.1.1"
        required: false
        type: string
  release:
    types: [published]
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - ".github/workflows/windows-release.yml"
      - "apps/desktop/**"
      - "apps/browser-extension/**"
      - "apps/vscode-extension/**"
      - "crates/**"
      - "scripts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "package.json"
      - "apps/desktop/package.json"
      - "apps/desktop/package-lock.json"
      - "!**/node_modules/**"
      - "!**/*.md"
      - "!docs/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/windows-release.yml"
      - "apps/desktop/**"
      - "apps/browser-extension/**"
      - "apps/vscode-extension/**"
      - "crates/**"
      - "scripts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "package.json"
      - "apps/desktop/package.json"
      - "apps/desktop/package-lock.json"
      - "!**/node_modules/**"
      - "!**/*.md"
      - "!docs/**"

concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Windows quality gate
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            apps/desktop/src-tauri -> apps/desktop/src-tauri/target

      - name: Install desktop dependencies
        run: npm --prefix apps/desktop ci

      - name: Typecheck desktop
        run: npm --prefix apps/desktop run check

      - name: Test desktop UI
        run: npm --prefix apps/desktop run test

      - name: Build desktop frontend
        run: npm --prefix apps/desktop run build

      - name: Check browser bridge extension
        run: npm run browser-extension:check

      - name: Check editor bridge extension
        run: npm run vscode-extension:check

      - name: Test packaging and bridge scripts
        run: npm run test:scripts

      - name: Test Rust workspace
        run: cargo test --workspace --all-targets

      - name: Test desktop Rust backend
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --all-targets

  installer:
    name: Windows installer
    runs-on: windows-latest
    needs: quality
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            apps/desktop/src-tauri -> apps/desktop/src-tauri/target

      - name: Install desktop dependencies
        run: npm --prefix apps/desktop ci

      - name: Build desktop frontend
        run: npm --prefix apps/desktop run build

      - name: Build NSIS and MSI installers
        run: npm --prefix apps/desktop run tauri -- build --bundles nsis,msi

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: daytrail-windows-installers
          if-no-files-found: error
          path: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi

      - name: Resolve release upload target
        id: release_target
        if: |
          startsWith(github.ref, 'refs/tags/v') ||
          github.event_name == 'release' ||
          (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        shell: pwsh
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag || '' }}
          EVENT_RELEASE_TAG: ${{ github.event.release.tag_name || '' }}
        run: |
          $tag = ""
          if ($env:INPUT_RELEASE_TAG) {
            $tag = $env:INPUT_RELEASE_TAG
          } elseif ($env:EVENT_RELEASE_TAG) {
            $tag = $env:EVENT_RELEASE_TAG
          } elseif ($env:GITHUB_REF -like "refs/tags/v*") {
            $tag = $env:GITHUB_REF_NAME
          }
          # Releases are published ONLY via an explicit tag or workflow_dispatch input.
          # Main-branch builds intentionally produce workflow artifacts only — never
          # silently overwrite an existing GitHub Release.
          Write-Host "Release upload target: $tag"
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Attach Windows installers to GitHub Release
        if: steps.release_target.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          overwrite_files: true
          tag_name: ${{ steps.release_target.outputs.tag }}
          files: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
