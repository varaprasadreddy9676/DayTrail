name: Auto-tag release

# Manually create a desktop release. If the current desktop version is already
# tagged, this workflow bumps the patch version, commits that metadata change
# back to main, tags it, and dispatches platform builds.
#
# Generated github-actions[bot] pushes are skipped to avoid release loops.

on:
  workflow_dispatch:

concurrency:
  group: auto-tag-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tag:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release version
        id: release_version
        run: |
          set -euo pipefail
          version="$(node -p "require('./apps/desktop/src-tauri/tauri.conf.json').version")"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version is not semver: $version" >&2
            exit 1
          fi

          target_version="$version"
          bumped="false"
          if git rev-parse -q --verify "refs/tags/v$version" >/dev/null; then
            IFS=. read -r major minor patch <<< "$version"
            target_version="$major.$minor.$((patch + 1))"
            bumped="true"
            echo "Current desktop version v$version is already tagged; auto-bumping to v$target_version."
          else
            echo "Desktop version v$version is not tagged yet; using explicit version from this push."
          fi

          if git rev-parse -q --verify "refs/tags/v$target_version" >/dev/null; then
            echo "::error::Resolved release tag v$target_version already exists."
            exit 1
          fi

          echo "version=$target_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$target_version" >> "$GITHUB_OUTPUT"
          echo "bumped=$bumped" >> "$GITHUB_OUTPUT"
          echo "Release target: v$target_version"

      - name: Auto-bump desktop version
        if: steps.release_version.outputs.bumped == 'true'
        env:
          VERSION: ${{ steps.release_version.outputs.version }}
        run: |
          set -euo pipefail
          node scripts/bump-desktop-version.mjs "$VERSION"

      - name: Verify version metadata
        env:
          EXPECTED: ${{ steps.release_version.outputs.version }}
        run: |
          set -euo pipefail
          v_pkg="$(node -p "require('./apps/desktop/package.json').version")"
          v_lock="$(node -p "require('./apps/desktop/package-lock.json').version")"
          v_tauri="$(node -p "require('./apps/desktop/src-tauri/tauri.conf.json').version")"
          v_cargo="$(grep -m1 '^version' apps/desktop/src-tauri/Cargo.toml | sed -E 's/.*"(.*)".*/\1/')"
          fail=0
          if [ "$v_pkg" != "$EXPECTED" ]; then
            echo "::error::apps/desktop/package.json version ($v_pkg) does not match release target ($EXPECTED)"
            fail=1
          fi
          if [ "$v_lock" != "$EXPECTED" ]; then
            echo "::error::apps/desktop/package-lock.json version ($v_lock) does not match release target ($EXPECTED)"
            fail=1
          fi
          if [ "$v_tauri" != "$EXPECTED" ]; then
            echo "::error::apps/desktop/src-tauri/tauri.conf.json version ($v_tauri) does not match release target ($EXPECTED)"
            fail=1
          fi
          if [ "$v_cargo" != "$EXPECTED" ]; then
            echo "::error::apps/desktop/src-tauri/Cargo.toml version ($v_cargo) does not match release target ($EXPECTED)"
            fail=1
          fi
          if [ "$fail" = "1" ]; then
            echo "Refusing to release with mismatched version metadata." >&2
            exit 1
          fi

      - name: Commit automatic version bump
        if: steps.release_version.outputs.bumped == 'true'
        env:
          TAG: ${{ steps.release_version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            apps/desktop/package.json \
            apps/desktop/package-lock.json \
            apps/desktop/src-tauri/tauri.conf.json \
            apps/desktop/src-tauri/Cargo.toml \
            apps/desktop/src-tauri/Cargo.lock
          git commit -m "chore(release): $TAG"
          git push origin HEAD:main
          echo "Pushed release metadata commit for $TAG."

      - name: Create and push tag
        env:
          TAG: ${{ steps.release_version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "DayTrail $TAG"
          git push origin "$TAG"
          echo "Pushed $TAG."

      # Tags pushed using the default GITHUB_TOKEN do NOT trigger other
      # workflows (GitHub's anti-recursion guard). Dispatch the release
      # builds explicitly so they pick up the new tag.
      - name: Trigger release builds
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release_version.outputs.tag }}
        run: |
          set -euo pipefail
          gh workflow run macos-release.yml --ref "$TAG" -f release_tag="$TAG"
          gh workflow run windows-release.yml --ref "$TAG" -f release_tag="$TAG"
          echo "Dispatched macOS and Windows release builds for $TAG."
