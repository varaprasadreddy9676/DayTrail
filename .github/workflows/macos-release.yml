name: macOS Build

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag to attach the DMG to, for example v0.1.1"
        required: false
        type: string
  release:
    types: [published]
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - ".github/workflows/macos-release.yml"
      - "apps/desktop/**"
      - "apps/browser-extension/**"
      - "apps/vscode-extension/**"
      - "crates/**"
      - "scripts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "package.json"
      - "apps/desktop/package.json"
      - "apps/desktop/package-lock.json"
      - "!**/node_modules/**"
      - "!**/*.md"
      - "!docs/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/macos-release.yml"
      - "apps/desktop/**"
      - "apps/browser-extension/**"
      - "apps/vscode-extension/**"
      - "crates/**"
      - "scripts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "package.json"
      - "apps/desktop/package.json"
      - "apps/desktop/package-lock.json"
      - "!**/node_modules/**"
      - "!**/*.md"
      - "!docs/**"

concurrency:
  group: macos-build-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  quality:
    name: macOS quality gate
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            apps/desktop/src-tauri -> apps/desktop/src-tauri/target

      - name: Install desktop dependencies
        run: npm --prefix apps/desktop ci

      - name: Typecheck desktop
        run: npm --prefix apps/desktop run check

      - name: Test desktop UI
        run: npm --prefix apps/desktop run test

      - name: Build desktop frontend
        run: npm --prefix apps/desktop run build

      # Advisory only: clippy lints drift with each Rust release, so a new lint
      # must not red the pipeline. The deterministic test steps are the gate.
      - name: Clippy desktop backend (advisory)
        continue-on-error: true
        run: cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Test Rust workspace
        run: cargo test --workspace --all-targets

      - name: Test desktop Rust backend
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --all-targets

  bundle:
    name: macOS app bundle
    runs-on: macos-latest
    needs: quality
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            apps/desktop/src-tauri -> apps/desktop/src-tauri/target

      - name: Install desktop dependencies
        run: npm --prefix apps/desktop ci

      - name: Build desktop frontend
        run: npm --prefix apps/desktop run build

      # Unsigned ad-hoc bundle. Signs the updater package with the project's own
      # RSA key so the in-app updater can verify downloads without needing a
      # paid Apple Developer ID.
      - name: Build app, dmg and updater bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: npm --prefix apps/desktop run tauri -- build --bundles app,dmg,updater

      - name: Upload macOS bundle
        uses: actions/upload-artifact@v4
        with:
          name: daytrail-macos-bundle
          if-no-files-found: error
          path: |
            apps/desktop/src-tauri/target/release/bundle/macos/*.app
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg

      - name: Resolve release upload target
        id: release_target
        if: |
          startsWith(github.ref, 'refs/tags/v') ||
          github.event_name == 'release' ||
          (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        shell: bash
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag || '' }}
          EVENT_RELEASE_TAG: ${{ github.event.release.tag_name || '' }}
        run: |
          set -euo pipefail
          tag=""
          if [ -n "$INPUT_RELEASE_TAG" ]; then
            tag="$INPUT_RELEASE_TAG"
          elif [ -n "$EVENT_RELEASE_TAG" ]; then
            tag="$EVENT_RELEASE_TAG"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tag="$GITHUB_REF_NAME"
          fi
          # Releases are published ONLY via an explicit tag or workflow_dispatch input.
          # Main-branch builds intentionally produce workflow artifacts only — never
          # silently overwrite an existing GitHub Release.
          echo "Release upload target: $tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Attach macOS DMG and updater bundle to GitHub Release
        if: steps.release_target.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          overwrite_files: true
          tag_name: ${{ steps.release_target.outputs.tag }}
          files: |
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
            apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig

      - name: Generate and upload latest.json
        if: steps.release_target.outputs.tag != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release_target.outputs.tag }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          sig_file=$(ls apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig)
          archive_name="$(basename "${sig_file%.sig}")"
          signature=$(cat "$sig_file")
          pub_date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          base_url="https://github.com/varaprasadreddy9676/DayTrail/releases/download/${TAG}"

          cat > /tmp/latest.json <<EOF
          {
            "version": "${version}",
            "pub_date": "${pub_date}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${signature}",
                "url": "${base_url}/${archive_name}"
              }
            }
          }
          EOF

          gh release upload "${TAG}" /tmp/latest.json --clobber

      - name: Update Homebrew cask
        if: steps.release_target.outputs.tag != ''
        shell: bash
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
          TAG: ${{ steps.release_target.outputs.tag }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          dmg="apps/desktop/src-tauri/target/release/bundle/dmg/DayTrail_${version}_aarch64.dmg"
          sha256=$(shasum -a 256 "$dmg" | awk '{print $1}')

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/varaprasadreddy9676/homebrew-tap.git" /tmp/homebrew-tap
          sed -i '' \
            -e "s/version \".*\"/version \"${version}\"/" \
            -e "s/sha256 \".*\"/sha256 \"${sha256}\"/" \
            /tmp/homebrew-tap/Casks/daytrail.rb
          cd /tmp/homebrew-tap
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Casks/daytrail.rb
          git diff --cached --quiet || git commit -m "chore: update DayTrail cask to ${version}"
          git push
