name: macOS Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: macos-build-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: macOS quality gate
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            apps/desktop/src-tauri -> apps/desktop/src-tauri/target

      - name: Install desktop dependencies
        run: npm --prefix apps/desktop ci

      - name: Typecheck desktop
        run: npm --prefix apps/desktop run check

      - name: Test desktop UI
        run: npm --prefix apps/desktop run test

      - name: Build desktop frontend
        run: npm --prefix apps/desktop run build

      - name: Clippy desktop backend
        run: cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Test Rust workspace
        run: cargo test --workspace --all-targets

      - name: Test desktop Rust backend
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --all-targets

  bundle:
    name: macOS app bundle
    runs-on: macos-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            apps/desktop/src-tauri -> apps/desktop/src-tauri/target

      - name: Install desktop dependencies
        run: npm --prefix apps/desktop ci

      - name: Build desktop frontend
        run: npm --prefix apps/desktop run build

      # Unsigned ad-hoc bundle. Notarization requires a paid Apple Developer ID;
      # this produces a runnable .app/.dmg for local-first / open-source use.
      - name: Build app and dmg
        run: npm --prefix apps/desktop run tauri -- build --bundles app,dmg

      - name: Upload macOS bundle
        uses: actions/upload-artifact@v4
        with:
          name: daytrail-macos-bundle
          if-no-files-found: error
          path: |
            apps/desktop/src-tauri/target/release/bundle/macos/*.app
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
